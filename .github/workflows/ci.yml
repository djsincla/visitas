name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny on the GITHUB_TOKEN scope. Jobs that need write access
# must request it explicitly via a per-job `permissions:` block. None of
# the current jobs (test / e2e / docker) write anything back to the
# repo, so contents:read is sufficient for the whole workflow.
permissions:
  contents: read

# Force the runner to execute JS-based actions on Node 24 instead of the
# default Node 20 runtime. The action *versions* (checkout/setup-node/
# upload-artifact @v5) still ship Node 20 internally — only the action
# authors can change that. This env flag opts us into Node 24 now, which
# silences the deprecation warning. Once Node 24 is the runner default
# (June 2026) this can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Server tests (vitest)
        run: npm test

      - name: Build web (Vite)
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Build container
        run: docker build -t visitas:ci .
